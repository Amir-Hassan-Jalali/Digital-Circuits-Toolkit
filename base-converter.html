<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Base Converter</title>
    <style>
        :root {
            --bg-color: #090b10;
            --panel: #11151d;
            --panel-strong: #151b26;
            --field: #090d14;
            --field-raised: #0e1420;
            --text-primary: #f8fafc;
            --text-secondary: #9aa7b8;
            --text-muted: #687589;
            --accent: #19c6b3;
            --accent-hover: #5eead4;
            --accent-soft: rgba(25, 198, 179, 0.13);
            --amber: #f5b84b;
            --coral: #f07167;
            --border: rgba(148, 163, 184, 0.18);
            --border-strong: rgba(148, 163, 184, 0.28);
            --error: #fb7185;
            --error-soft: rgba(251, 113, 133, 0.12);
            --shadow: 0 30px 90px rgba(0, 0, 0, 0.42);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background:
                linear-gradient(135deg, rgba(25, 198, 179, 0.16), transparent 34%),
                linear-gradient(315deg, rgba(240, 113, 103, 0.13), transparent 32%),
                linear-gradient(180deg, #10131b 0%, var(--bg-color) 64%);
            color: var(--text-primary);
            font-family: Inter, 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px;
            padding-top: max(18px, env(safe-area-inset-top));
            padding-bottom: max(18px, env(safe-area-inset-bottom));
        }

        button,
        input,
        select {
            font: inherit;
        }

        .container {
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 42%),
                var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 860px;
            overflow: hidden;
            position: relative;
        }

        .container::before {
            content: "";
            position: absolute;
            inset: 0 0 auto;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--amber), var(--coral));
        }

        header {
            align-items: flex-start;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            padding: 1.35rem 1.5rem 1.1rem;
        }

        h1 {
            color: var(--text-primary);
            font-size: 1.6rem;
            font-weight: 760;
            letter-spacing: 0;
            line-height: 1.12;
            margin-bottom: 0.38rem;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .status-line {
            align-items: center;
            color: var(--text-muted);
            display: flex;
            flex: 0 0 auto;
            font-size: 0.82rem;
            gap: 0.45rem;
            min-height: 1.25rem;
            padding-top: 0.15rem;
        }

        .status-dot {
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(25, 198, 179, 0.12);
            height: 7px;
            width: 7px;
        }

        .status-line.error .status-dot {
            background: var(--error);
            box-shadow: 0 0 0 4px rgba(251, 113, 133, 0.12);
        }

        .workspace {
            display: grid;
            gap: 1rem;
            grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
            padding: 1.25rem;
        }

        .input-group {
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent),
                var(--panel-strong);
            border: 1px solid var(--border);
            border-radius: 8px;
            min-width: 0;
            padding: 1rem;
            position: relative;
        }

        label {
            align-items: center;
            color: var(--text-secondary);
            display: flex;
            font-size: 0.76rem;
            font-weight: 760;
            justify-content: space-between;
            letter-spacing: 0;
            margin-bottom: 0.8rem;
            text-transform: uppercase;
        }

        label span:last-child {
            color: var(--accent-hover);
            font-size: 0.72rem;
            text-transform: none;
        }

        .input-wrapper {
            display: grid;
            gap: 0.7rem;
            grid-template-columns: minmax(0, 1fr) 112px;
        }

        input,
        select {
            background-color: var(--field);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.18s, box-shadow 0.18s, background-color 0.18s;
        }

        input {
            font-family: 'Cascadia Mono', 'SFMono-Regular', Consolas, 'Courier New', monospace;
            font-size: 1.35rem;
            font-weight: 650;
            min-height: 58px;
            min-width: 0;
            padding: 0 0.9rem;
            width: 100%;
        }

        input::placeholder {
            color: rgba(154, 167, 184, 0.46);
        }

        input:focus,
        select:focus {
            border-color: rgba(94, 234, 212, 0.78);
            box-shadow: 0 0 0 3px rgba(25, 198, 179, 0.14);
        }

        input.invalid {
            background: var(--error-soft);
            border-color: rgba(251, 113, 133, 0.74);
            color: #fecdd3;
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239aa7b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-position: right 12px center;
            background-repeat: no-repeat;
            background-size: 16px;
            cursor: pointer;
            font-size: 0.94rem;
            font-weight: 700;
            min-height: 58px;
            padding: 0 2rem 0 0.85rem;
        }

        select option {
            background-color: #111827;
            color: var(--text-primary);
        }

        .base-shortcuts {
            display: grid;
            gap: 0.45rem;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            margin-top: 0.75rem;
        }

        .preset-btn {
            background: var(--field-raised);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.72rem;
            font-weight: 760;
            min-height: 34px;
            transition: background-color 0.18s, border-color 0.18s, color 0.18s;
        }

        .preset-btn:hover,
        .preset-btn.active {
            background: var(--accent-soft);
            border-color: rgba(94, 234, 212, 0.38);
            color: var(--accent-hover);
        }

        .swap-container {
            align-items: center;
            display: flex;
            justify-content: center;
            padding-top: 2.25rem;
            z-index: 5;
        }

        .swap-btn,
        .copy-btn {
            align-items: center;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
        }

        .swap-btn {
            background: linear-gradient(135deg, var(--accent), #2dd4bf);
            border-radius: 50%;
            box-shadow: 0 14px 30px rgba(25, 198, 179, 0.24);
            color: #04110f;
            height: 48px;
            transition: transform 0.24s, box-shadow 0.24s;
            width: 48px;
        }

        .swap-btn:hover {
            box-shadow: 0 18px 36px rgba(25, 198, 179, 0.32);
            transform: rotate(180deg) scale(1.04);
        }

        .swap-btn:focus-visible,
        .copy-btn:focus-visible,
        .preset-btn:focus-visible {
            outline: 3px solid rgba(94, 234, 212, 0.28);
            outline-offset: 3px;
        }

        .swap-btn svg {
            height: 19px;
            width: 19px;
        }

        .output-wrapper {
            position: relative;
        }

        .output-field {
            background:
                linear-gradient(180deg, rgba(25, 198, 179, 0.1), rgba(25, 198, 179, 0.05)),
                var(--field);
            border-color: rgba(94, 234, 212, 0.34);
            color: var(--accent-hover);
            cursor: pointer;
            padding-right: 3.2rem;
        }

        .copy-btn {
            background: rgba(248, 250, 252, 0.06);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--accent-hover);
            height: 38px;
            position: absolute;
            right: 10px;
            top: 10px;
            transition: background-color 0.18s, border-color 0.18s, color 0.18s;
            width: 38px;
        }

        .copy-btn:hover {
            background: var(--accent-soft);
            border-color: rgba(94, 234, 212, 0.42);
            color: #ffffff;
        }

        .copy-btn svg {
            height: 17px;
            width: 17px;
        }

        .toast {
            background-color: #f8fafc;
            border-radius: 999px;
            bottom: 20px;
            box-shadow: 0 18px 34px rgba(0, 0, 0, 0.32);
            color: #090b10;
            font-size: 0.85rem;
            font-weight: 720;
            left: 50%;
            opacity: 0;
            padding: 10px 18px;
            pointer-events: none;
            position: fixed;
            transform: translateX(-50%) translateY(20px);
            transition: all 0.3s ease;
            white-space: nowrap;
            z-index: 100;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 760px) {
            body {
                align-items: flex-start;
            }

            header {
                display: block;
                padding: 1.2rem 1rem 1rem;
            }

            .status-line {
                margin-top: 0.85rem;
            }

            .workspace {
                display: flex;
                flex-direction: column;
                gap: 0.85rem;
                padding: 1rem;
            }

            .swap-container {
                margin: -0.15rem 0;
                padding-top: 0;
            }

            .swap-btn {
                height: 42px;
                width: 42px;
            }

            .input-wrapper {
                grid-template-columns: minmax(0, 1fr) 104px;
            }

            input {
                font-size: 1.08rem;
                min-height: 52px;
            }

            select {
                font-size: 0.86rem;
                min-height: 52px;
            }

            h1 {
                font-size: 1.35rem;
            }
        }

        @media (max-width: 420px) {
            body {
                padding-left: 12px;
                padding-right: 12px;
            }

            .input-wrapper {
                grid-template-columns: 1fr;
            }

            .base-shortcuts {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .copy-btn {
                height: 34px;
                top: 9px;
                width: 34px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div>
                <h1>Universal Base Converter</h1>
                <p class="subtitle">Integer bases 2 to 36</p>
            </div>
            <div class="status-line" id="statusLine">
                <span class="status-dot"></span>
                <span id="statusText">Ready</span>
            </div>
        </header>

        <div class="workspace">

            <div class="input-group">
                <label for="inputValue">
                    <span>Input</span>
                    <span id="inputBaseDisplay">Base 10</span>
                </label>
                <div class="input-wrapper">
                    <input type="text" id="inputValue" placeholder="0" autocomplete="off">
                    <select id="inputBase" aria-label="Input base">
                        <!-- Options populated by JS -->
                    </select>
                </div>
                <div class="base-shortcuts" data-target="inputBase" aria-label="Input base presets">
                    <button class="preset-btn" type="button" data-base="2">BIN</button>
                    <button class="preset-btn" type="button" data-base="8">OCT</button>
                    <button class="preset-btn" type="button" data-base="10">DEC</button>
                    <button class="preset-btn" type="button" data-base="16">HEX</button>
                </div>
            </div>

            <div class="swap-container">
                <button class="swap-btn" id="swapBtn" type="button" title="Swap Input and Output"
                    aria-label="Swap input and output bases">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                        stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
                    </svg>
                </button>
            </div>

            <div class="input-group">
                <label for="outputValue">
                    <span>Output</span>
                    <span id="outputBaseDisplay">Base 2</span>
                </label>
                <div class="input-wrapper">
                    <div class="output-wrapper">
                        <input type="text" id="outputValue" class="output-field" readonly placeholder="0">
                        <button class="copy-btn" id="copyBtn" type="button" title="Copy output"
                            aria-label="Copy output">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M8 8h10v12H8z M6 16H4V4h12v2" />
                            </svg>
                        </button>
                    </div>
                    <select id="outputBase" aria-label="Output base">
                        <!-- Options populated by JS -->
                    </select>
                </div>
                <div class="base-shortcuts" data-target="outputBase" aria-label="Output base presets">
                    <button class="preset-btn" type="button" data-base="2">BIN</button>
                    <button class="preset-btn" type="button" data-base="8">OCT</button>
                    <button class="preset-btn" type="button" data-base="10">DEC</button>
                    <button class="preset-btn" type="button" data-base="16">HEX</button>
                </div>
            </div>

        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Copied to clipboard!</div>

    <script>
        const inputVal = document.getElementById('inputValue');
        const inputBase = document.getElementById('inputBase');
        const outputVal = document.getElementById('outputValue');
        const outputBase = document.getElementById('outputBase');
        const swapBtn = document.getElementById('swapBtn');
        const copyBtn = document.getElementById('copyBtn');
        const inputBaseDisplay = document.getElementById('inputBaseDisplay');
        const outputBaseDisplay = document.getElementById('outputBaseDisplay');
        const statusLine = document.getElementById('statusLine');
        const statusText = document.getElementById('statusText');

        function populateBases() {
            for (let i = 2; i <= 36; i++) {
                const opt1 = new Option(`Base ${i}`, i);
                const opt2 = new Option(`Base ${i}`, i);
                inputBase.add(opt1);
                outputBase.add(opt2);
            }
            inputBase.value = "10";
            outputBase.value = "2";
        }

        function setStatus(message, isError = false) {
            statusText.textContent = message;
            statusLine.classList.toggle('error', isError);
        }

        function updatePresetButtons() {
            document.querySelectorAll('.base-shortcuts').forEach((group) => {
                const select = document.getElementById(group.dataset.target);

                group.querySelectorAll('.preset-btn').forEach((button) => {
                    button.classList.toggle('active', button.dataset.base === select.value);
                });
            });
        }

        function getDigitValue(char) {
            const code = char.charCodeAt(0);

            if (code >= 48 && code <= 57) {
                return code - 48;
            }

            if (code >= 65 && code <= 90) {
                return code - 55;
            }

            return -1;
        }

        function isValidForBase(value, base) {
            return [...value].every((char) => {
                const digit = getDigitValue(char);
                return digit >= 0 && digit < base;
            });
        }

        function parseBigIntFromBase(value, base) {
            const bigBase = BigInt(base);
            let total = 0n;

            for (const char of value) {
                total = total * bigBase + BigInt(getDigitValue(char));
            }

            return total;
        }

        function formatBigIntToBase(value, base) {
            const digits = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";

            if (value === 0n) {
                return "0";
            }

            const bigBase = BigInt(base);
            let remaining = value;
            let result = "";

            while (remaining > 0n) {
                const digit = Number(remaining % bigBase);
                result = digits[digit] + result;
                remaining /= bigBase;
            }

            return result;
        }

        function convert() {
            const val = inputVal.value.trim().toUpperCase();
            const baseIn = parseInt(inputBase.value);
            const baseOut = parseInt(outputBase.value);

            inputBaseDisplay.textContent = `Base ${baseIn}`;
            outputBaseDisplay.textContent = `Base ${baseOut}`;

            if (val === "") {
                outputVal.value = "";
                inputVal.classList.remove('invalid');
                setStatus('Ready');
                updatePresetButtons();
                return;
            }

            if (!isValidForBase(val, baseIn)) {
                inputVal.classList.add('invalid');
                outputVal.value = "";
                setStatus(`Invalid digit for base ${baseIn}`, true);
                updatePresetButtons();
                return;
            } else {
                inputVal.classList.remove('invalid');
            }

            try {
                const decimalValue = parseBigIntFromBase(val, baseIn);
                outputVal.value = formatBigIntToBase(decimalValue, baseOut);
                setStatus(`${val.length} digit${val.length === 1 ? '' : 's'} converted`);
                updatePresetButtons();

            } catch (e) {
                console.error("Conversion error:", e);
                outputVal.value = "Error";
                setStatus('Conversion error', true);
            }
        }

        swapBtn.addEventListener('click', () => {
            const currentOutput = outputVal.value;
            if (currentOutput && currentOutput !== "Error" && currentOutput !== "") {
                inputVal.value = currentOutput;
                const tempBase = inputBase.value;
                inputBase.value = outputBase.value;
                outputBase.value = tempBase;
                convert();
            }
        });

        inputVal.addEventListener('input', convert);
        inputBase.addEventListener('change', convert);
        outputBase.addEventListener('change', convert);

        document.querySelectorAll('.preset-btn').forEach((button) => {
            button.addEventListener('click', () => {
                const group = button.closest('.base-shortcuts');
                const select = document.getElementById(group.dataset.target);

                select.value = button.dataset.base;
                convert();
            });
        });

        function copyOutput() {
            if (outputVal.value && outputVal.value !== "Error") {
                if (!navigator.clipboard) {
                    outputVal.select();
                    return;
                }

                navigator.clipboard.writeText(outputVal.value).then(() => {
                    showToast();
                }).catch(() => {
                    outputVal.select();
                });
            }
        }

        outputVal.addEventListener('click', copyOutput);
        copyBtn.addEventListener('click', copyOutput);

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        populateBases();
        convert();
    </script>
</body>

</html>
