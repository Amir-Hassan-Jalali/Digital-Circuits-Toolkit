<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truth Table Generator</title>
    <link rel="stylesheet" href="assets/css/truth-table.css">
</head>

<body>
    <div class="container">
        <header>
            <a class="back-btn" href="index.html" aria-label="Back to home" title="Back to home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h12" />
                </svg>
            </a>
            <div>
                <h1>Truth Table Generator</h1>
                <p class="subtitle">Build tables for Boolean functions with variables and logic operators</p>
            </div>
            <div class="status-line" id="statusLine">
                <span class="status-dot"></span>
                <span id="statusText">Ready</span>
            </div>
        </header>

        <div class="workspace">
            <section class="panel">
                <label for="expressionInput">
                    <span>Function</span>
                    <span>Boolean expression</span>
                </label>
                <input type="text" id="expressionInput" placeholder="(A & B) -> C" autocomplete="off">

                <div class="token-grid" aria-label="Operator shortcuts">
                    <button class="token-btn" type="button" data-token="!">NOT</button>
                    <button class="token-btn" type="button" data-token="&">AND</button>
                    <button class="token-btn" type="button" data-token="|">OR</button>
                    <button class="token-btn" type="button" data-token="^">XOR</button>
                    <button class="token-btn" type="button" data-token="->">IMPL</button>
                    <button class="token-btn" type="button" data-token="<->">IFF</button>
                </div>

                <div class="action-row">
                    <button class="action-btn" type="button" id="generateBtn">Generate</button>
                    <button class="action-btn secondary" type="button" id="clearBtn">Clear</button>
                </div>

                <div class="hint-box">
                    Use variables like A, B, C or names like p, carry, enable. Supported operators:
                    !, &, |, ^, ->, <-> plus NOT, AND, OR, XOR.
                </div>
            </section>

            <section class="panel">
                <div class="summary">
                    <span class="summary-title">Expression</span>
                    <span class="summary-value" id="expressionSummary">-</span>
                </div>
                <div id="tableHost" class="empty-state">Enter a Boolean function to generate a truth table.</div>
            </section>
        </div>
    </div>
    <script src="assets/js/truth-table.js"></script>

</body>

</html>
