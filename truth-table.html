<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truth Table Generator</title>
    <style>
        :root {
            --bg-color: #090b10;
            --panel: #11151d;
            --panel-strong: #151b26;
            --field: #090d14;
            --field-raised: #0e1420;
            --text-primary: #f8fafc;
            --text-secondary: #9aa7b8;
            --text-muted: #687589;
            --accent: #19c6b3;
            --accent-hover: #5eead4;
            --accent-soft: rgba(25, 198, 179, 0.13);
            --amber: #f5b84b;
            --coral: #f07167;
            --border: rgba(148, 163, 184, 0.18);
            --error: #fb7185;
            --error-soft: rgba(251, 113, 133, 0.12);
            --shadow: 0 30px 90px rgba(0, 0, 0, 0.42);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background:
                linear-gradient(135deg, rgba(25, 198, 179, 0.16), transparent 34%),
                linear-gradient(315deg, rgba(240, 113, 103, 0.13), transparent 32%),
                linear-gradient(180deg, #10131b 0%, var(--bg-color) 64%);
            color: var(--text-primary);
            font-family: Inter, 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px;
            padding-top: max(18px, env(safe-area-inset-top));
            padding-bottom: max(18px, env(safe-area-inset-bottom));
        }

        button,
        input {
            font: inherit;
        }

        .container {
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 42%),
                var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: var(--shadow);
            max-width: 980px;
            overflow: hidden;
            position: relative;
            width: 100%;
        }

        .container::before {
            content: "";
            position: absolute;
            inset: 0 0 auto;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--amber), var(--coral));
        }

        header {
            align-items: flex-start;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            padding: 1.35rem 1.5rem 1.1rem;
        }

        h1 {
            color: var(--text-primary);
            font-size: 1.6rem;
            font-weight: 760;
            letter-spacing: 0;
            line-height: 1.12;
            margin-bottom: 0.38rem;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .status-line {
            align-items: center;
            color: var(--text-muted);
            display: flex;
            flex: 0 0 auto;
            font-size: 0.82rem;
            gap: 0.45rem;
            min-height: 1.25rem;
            padding-top: 0.15rem;
        }

        .status-dot {
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(25, 198, 179, 0.12);
            height: 7px;
            width: 7px;
        }

        .status-line.error .status-dot {
            background: var(--error);
            box-shadow: 0 0 0 4px rgba(251, 113, 133, 0.12);
        }

        .workspace {
            display: grid;
            gap: 1rem;
            grid-template-columns: 330px minmax(0, 1fr);
            padding: 1.25rem;
        }

        .panel {
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent),
                var(--panel-strong);
            border: 1px solid var(--border);
            border-radius: 8px;
            min-width: 0;
            padding: 1rem;
        }

        label {
            color: var(--text-secondary);
            display: flex;
            font-size: 0.76rem;
            font-weight: 760;
            justify-content: space-between;
            letter-spacing: 0;
            margin-bottom: 0.55rem;
            text-transform: uppercase;
        }

        label span:last-child {
            color: var(--accent-hover);
            font-size: 0.72rem;
            text-transform: none;
        }

        input {
            background-color: var(--field);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Cascadia Mono', 'SFMono-Regular', Consolas, 'Courier New', monospace;
            font-size: 1.05rem;
            font-weight: 650;
            min-height: 56px;
            outline: none;
            padding: 0 0.9rem;
            transition: border-color 0.18s, box-shadow 0.18s, background-color 0.18s;
            width: 100%;
        }

        input::placeholder {
            color: rgba(154, 167, 184, 0.46);
        }

        input:focus {
            border-color: rgba(94, 234, 212, 0.78);
            box-shadow: 0 0 0 3px rgba(25, 198, 179, 0.14);
        }

        input.invalid {
            background: var(--error-soft);
            border-color: rgba(251, 113, 133, 0.74);
            color: #fecdd3;
        }

        .token-grid {
            display: grid;
            gap: 0.45rem;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            margin-top: 0.85rem;
        }

        .token-btn,
        .action-btn {
            align-items: center;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
        }

        .token-btn {
            background: var(--field-raised);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: 'Cascadia Mono', 'SFMono-Regular', Consolas, 'Courier New', monospace;
            font-size: 0.84rem;
            font-weight: 760;
            min-height: 36px;
            transition: background-color 0.18s, border-color 0.18s, color 0.18s;
        }

        .token-btn:hover {
            background: var(--accent-soft);
            border-color: rgba(94, 234, 212, 0.38);
            color: var(--accent-hover);
        }

        .action-row {
            display: grid;
            gap: 0.6rem;
            grid-template-columns: 1fr 1fr;
            margin-top: 0.85rem;
        }

        .action-btn {
            background: linear-gradient(135deg, var(--accent), #2dd4bf);
            border-radius: 8px;
            color: #04110f;
            font-size: 0.82rem;
            font-weight: 780;
            min-height: 42px;
            transition: transform 0.18s, box-shadow 0.18s;
        }

        .action-btn.secondary {
            background: var(--field-raised);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .action-btn:hover {
            box-shadow: 0 12px 26px rgba(25, 198, 179, 0.18);
            transform: translateY(-1px);
        }

        .token-btn:focus-visible,
        .action-btn:focus-visible {
            outline: 3px solid rgba(94, 234, 212, 0.28);
            outline-offset: 3px;
        }

        .hint-box {
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.78rem;
            line-height: 1.55;
            margin-top: 1rem;
            padding-top: 1rem;
        }

        .summary {
            align-items: center;
            display: flex;
            gap: 0.6rem;
            justify-content: space-between;
            margin-bottom: 0.85rem;
        }

        .summary-title {
            color: var(--text-secondary);
            font-size: 0.76rem;
            font-weight: 760;
            text-transform: uppercase;
        }

        .summary-value {
            color: var(--accent-hover);
            font-family: 'Cascadia Mono', 'SFMono-Regular', Consolas, 'Courier New', monospace;
            font-size: 0.84rem;
            overflow-wrap: anywhere;
            text-align: right;
        }

        .table-wrap {
            border: 1px solid var(--border);
            border-radius: 8px;
            max-height: 520px;
            overflow: auto;
        }

        table {
            border-collapse: collapse;
            font-family: 'Cascadia Mono', 'SFMono-Regular', Consolas, 'Courier New', monospace;
            font-size: 0.88rem;
            min-width: 100%;
            text-align: center;
        }

        th,
        td {
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
            padding: 0.72rem 0.85rem;
            white-space: nowrap;
        }

        th {
            background: #0d131e;
            color: var(--text-secondary);
            font-weight: 760;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        td {
            color: var(--text-primary);
        }

        td.result {
            background: rgba(25, 198, 179, 0.08);
            color: var(--accent-hover);
            font-weight: 780;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .empty-state {
            align-items: center;
            border: 1px dashed var(--border);
            border-radius: 8px;
            color: var(--text-muted);
            display: flex;
            font-size: 0.9rem;
            justify-content: center;
            min-height: 260px;
            text-align: center;
            padding: 1.5rem;
        }

        @media (max-width: 820px) {
            body {
                align-items: flex-start;
            }

            header {
                display: block;
                padding: 1.2rem 1rem 1rem;
            }

            .status-line {
                margin-top: 0.85rem;
            }

            .workspace {
                grid-template-columns: 1fr;
                padding: 1rem;
            }
        }

        @media (max-width: 430px) {
            body {
                padding-left: 12px;
                padding-right: 12px;
            }

            h1 {
                font-size: 1.34rem;
            }

            .token-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .action-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div>
                <h1>Truth Table Generator</h1>
                <p class="subtitle">Build tables for Boolean functions with variables and logic operators</p>
            </div>
            <div class="status-line" id="statusLine">
                <span class="status-dot"></span>
                <span id="statusText">Ready</span>
            </div>
        </header>

        <div class="workspace">
            <section class="panel">
                <label for="expressionInput">
                    <span>Function</span>
                    <span>Boolean expression</span>
                </label>
                <input type="text" id="expressionInput" placeholder="(A & B) -> C" autocomplete="off">

                <div class="token-grid" aria-label="Operator shortcuts">
                    <button class="token-btn" type="button" data-token="!">NOT</button>
                    <button class="token-btn" type="button" data-token="&">AND</button>
                    <button class="token-btn" type="button" data-token="|">OR</button>
                    <button class="token-btn" type="button" data-token="^">XOR</button>
                    <button class="token-btn" type="button" data-token="->">IMPL</button>
                    <button class="token-btn" type="button" data-token="<->">IFF</button>
                </div>

                <div class="action-row">
                    <button class="action-btn" type="button" id="generateBtn">Generate</button>
                    <button class="action-btn secondary" type="button" id="clearBtn">Clear</button>
                </div>

                <div class="hint-box">
                    Use variables like A, B, C or names like p, carry, enable. Supported operators:
                    !, &, |, ^, ->, <-> plus NOT, AND, OR, XOR.
                </div>
            </section>

            <section class="panel">
                <div class="summary">
                    <span class="summary-title">Expression</span>
                    <span class="summary-value" id="expressionSummary">-</span>
                </div>
                <div id="tableHost" class="empty-state">Enter a Boolean function to generate a truth table.</div>
            </section>
        </div>
    </div>

    <script>
        const expressionInput = document.getElementById('expressionInput');
        const generateBtn = document.getElementById('generateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const tableHost = document.getElementById('tableHost');
        const statusLine = document.getElementById('statusLine');
        const statusText = document.getElementById('statusText');
        const expressionSummary = document.getElementById('expressionSummary');

        const precedence = {
            NOT: 5,
            AND: 4,
            XOR: 3,
            OR: 2,
            IMPLIES: 1,
            IFF: 0
        };

        const rightAssociative = new Set(['NOT', 'IMPLIES']);
        const unary = new Set(['NOT']);

        function setStatus(message, isError = false) {
            statusText.textContent = message;
            statusLine.classList.toggle('error', isError);
        }

        function normalizeOperator(word) {
            const upper = word.toUpperCase();
            if (upper === 'NOT') return 'NOT';
            if (upper === 'AND') return 'AND';
            if (upper === 'OR') return 'OR';
            if (upper === 'XOR') return 'XOR';
            if (upper === 'TRUE') return 'TRUE';
            if (upper === 'FALSE') return 'FALSE';
            return null;
        }

        function tokenize(expression) {
            const tokens = [];
            let index = 0;

            while (index < expression.length) {
                const char = expression[index];

                if (/\s/.test(char)) {
                    index++;
                    continue;
                }

                if (expression.startsWith('<->', index) || expression.startsWith('<=>', index)) {
                    tokens.push({ type: 'op', value: 'IFF' });
                    index += 3;
                    continue;
                }

                if (expression.startsWith('->', index) || expression.startsWith('=>', index)) {
                    tokens.push({ type: 'op', value: 'IMPLIES' });
                    index += 2;
                    continue;
                }

                if (char === '(' || char === ')') {
                    tokens.push({ type: 'paren', value: char });
                    index++;
                    continue;
                }

                if (char === '!' || char === '~' || char === '¬') {
                    tokens.push({ type: 'op', value: 'NOT' });
                    index++;
                    continue;
                }

                if (char === '&' || char === '∧') {
                    tokens.push({ type: 'op', value: 'AND' });
                    index++;
                    continue;
                }

                if (char === '|' || char === '∨') {
                    tokens.push({ type: 'op', value: 'OR' });
                    index++;
                    continue;
                }

                if (char === '^' || char === '⊕') {
                    tokens.push({ type: 'op', value: 'XOR' });
                    index++;
                    continue;
                }

                if (/[A-Za-z_]/.test(char)) {
                    let word = char;
                    index++;

                    while (index < expression.length && /[A-Za-z0-9_]/.test(expression[index])) {
                        word += expression[index];
                        index++;
                    }

                    const operator = normalizeOperator(word);

                    if (operator === 'TRUE' || operator === 'FALSE') {
                        tokens.push({ type: 'const', value: operator === 'TRUE' });
                    } else {
                        tokens.push(operator ? { type: 'op', value: operator } : { type: 'var', value: word });
                    }
                    continue;
                }

                if (char === '0' || char === '1') {
                    tokens.push({ type: 'const', value: char === '1' });
                    index++;
                    continue;
                }

                throw new Error(`Unexpected character "${char}"`);
            }

            return tokens;
        }

        function toRpn(tokens) {
            const output = [];
            const operators = [];

            tokens.forEach((token) => {
                if (token.type === 'var' || token.type === 'const') {
                    output.push(token);
                    return;
                }

                if (token.type === 'paren' && token.value === '(') {
                    operators.push(token);
                    return;
                }

                if (token.type === 'paren' && token.value === ')') {
                    while (operators.length && operators[operators.length - 1].value !== '(') {
                        output.push(operators.pop());
                    }

                    if (!operators.length) throw new Error('Mismatched parentheses');
                    operators.pop();
                    return;
                }

                if (token.type === 'op') {
                    while (operators.length) {
                        const top = operators[operators.length - 1];
                        if (top.type === 'paren') break;

                        const higher = precedence[top.value] > precedence[token.value];
                        const equalAndLeft = precedence[top.value] === precedence[token.value] && !rightAssociative.has(token.value);

                        if (!higher && !equalAndLeft) break;
                        output.push(operators.pop());
                    }

                    operators.push(token);
                }
            });

            while (operators.length) {
                const token = operators.pop();
                if (token.type === 'paren') throw new Error('Mismatched parentheses');
                output.push(token);
            }

            return output;
        }

        function evaluateRpn(rpn, assignment) {
            const stack = [];

            rpn.forEach((token) => {
                if (token.type === 'const') {
                    stack.push(token.value);
                    return;
                }

                if (token.type === 'var') {
                    stack.push(Boolean(assignment[token.value]));
                    return;
                }

                if (unary.has(token.value)) {
                    if (stack.length < 1) throw new Error('Missing operand');
                    stack.push(!stack.pop());
                    return;
                }

                if (stack.length < 2) throw new Error('Missing operand');
                const right = stack.pop();
                const left = stack.pop();

                if (token.value === 'AND') stack.push(left && right);
                if (token.value === 'OR') stack.push(left || right);
                if (token.value === 'XOR') stack.push(left !== right);
                if (token.value === 'IMPLIES') stack.push(!left || right);
                if (token.value === 'IFF') stack.push(left === right);
            });

            if (stack.length !== 1) throw new Error('Invalid expression');
            return stack[0];
        }

        function getVariables(tokens) {
            return [...new Set(tokens.filter((token) => token.type === 'var').map((token) => token.value))]
                .sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
        }

        function makeRows(variables, rpn) {
            const total = 2 ** variables.length;
            const rows = [];

            for (let mask = 0; mask < total; mask++) {
                const assignment = {};

                variables.forEach((variable, index) => {
                    assignment[variable] = Boolean((mask >> (variables.length - index - 1)) & 1);
                });

                rows.push({ assignment, result: evaluateRpn(rpn, assignment) });
            }

            return rows;
        }

        function renderTable(variables, rows, expression) {
            const table = document.createElement('table');
            const thead = document.createElement('thead');
            const tbody = document.createElement('tbody');
            const headerRow = document.createElement('tr');

            [...variables, 'F'].forEach((heading) => {
                const th = document.createElement('th');
                th.textContent = heading === 'F' ? expression : heading;
                headerRow.appendChild(th);
            });

            thead.appendChild(headerRow);

            rows.forEach((row) => {
                const tr = document.createElement('tr');

                variables.forEach((variable) => {
                    const td = document.createElement('td');
                    td.textContent = row.assignment[variable] ? '1' : '0';
                    tr.appendChild(td);
                });

                const resultCell = document.createElement('td');
                resultCell.className = 'result';
                resultCell.textContent = row.result ? '1' : '0';
                tr.appendChild(resultCell);
                tbody.appendChild(tr);
            });

            table.appendChild(thead);
            table.appendChild(tbody);

            tableHost.className = 'table-wrap';
            tableHost.replaceChildren(table);
        }

        function generate() {
            const expression = expressionInput.value.trim();
            expressionInput.classList.remove('invalid');

            if (!expression) {
                tableHost.className = 'empty-state';
                tableHost.textContent = 'Enter a Boolean function to generate a truth table.';
                expressionSummary.textContent = '-';
                setStatus('Ready');
                return;
            }

            try {
                const tokens = tokenize(expression);
                const variables = getVariables(tokens);

                if (variables.length === 0) throw new Error('Use at least one variable');
                if (variables.length > 8) throw new Error('Use 8 variables or fewer');

                const rpn = toRpn(tokens);
                const rows = makeRows(variables, rpn);
                renderTable(variables, rows, expression);
                expressionSummary.textContent = expression;
                setStatus(`${rows.length} rows, ${variables.length} variable${variables.length === 1 ? '' : 's'}`);
            } catch (error) {
                expressionInput.classList.add('invalid');
                tableHost.className = 'empty-state';
                tableHost.textContent = error.message;
                expressionSummary.textContent = expression || '-';
                setStatus(error.message, true);
            }
        }

        function insertToken(token) {
            const start = expressionInput.selectionStart;
            const end = expressionInput.selectionEnd;
            const before = expressionInput.value.slice(0, start);
            const after = expressionInput.value.slice(end);
            const padded = token.length > 1 ? ` ${token} ` : ` ${token} `;

            expressionInput.value = before + padded + after;
            expressionInput.focus();
            expressionInput.selectionStart = expressionInput.selectionEnd = before.length + padded.length;
            generate();
        }

        document.querySelectorAll('.token-btn').forEach((button) => {
            button.addEventListener('click', () => insertToken(button.dataset.token));
        });

        generateBtn.addEventListener('click', generate);
        clearBtn.addEventListener('click', () => {
            expressionInput.value = '';
            generate();
            expressionInput.focus();
        });
        expressionInput.addEventListener('input', generate);

        expressionInput.value = '(A & B) -> C';
        generate();
    </script>
</body>

</html>
