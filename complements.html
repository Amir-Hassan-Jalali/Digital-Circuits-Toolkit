<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complement Calculator</title>
    <style>
        :root {
            --bg-color: #090b10;
            --panel: #11151d;
            --panel-strong: #151b26;
            --field: #090d14;
            --field-raised: #0e1420;
            --text-primary: #f8fafc;
            --text-secondary: #9aa7b8;
            --text-muted: #687589;
            --accent: #19c6b3;
            --accent-hover: #5eead4;
            --accent-soft: rgba(25, 198, 179, 0.13);
            --amber: #f5b84b;
            --coral: #f07167;
            --border: rgba(148, 163, 184, 0.18);
            --error: #fb7185;
            --error-soft: rgba(251, 113, 133, 0.12);
            --shadow: 0 30px 90px rgba(0, 0, 0, 0.42);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background:
                linear-gradient(135deg, rgba(25, 198, 179, 0.16), transparent 34%),
                linear-gradient(315deg, rgba(240, 113, 103, 0.13), transparent 32%),
                linear-gradient(180deg, #10131b 0%, var(--bg-color) 64%);
            color: var(--text-primary);
            font-family: Inter, 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px;
            padding-top: max(18px, env(safe-area-inset-top));
            padding-bottom: max(18px, env(safe-area-inset-bottom));
        }

        button,
        input,
        select {
            font: inherit;
        }

        .container {
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 42%),
                var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: var(--shadow);
            max-width: 960px;
            overflow: hidden;
            position: relative;
            width: 100%;
        }

        .container::before {
            content: "";
            position: absolute;
            inset: 0 0 auto;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--amber), var(--coral));
        }

        header {
            align-items: flex-start;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            padding: 1.35rem 1.5rem 1.1rem;
        }

        h1 {
            color: var(--text-primary);
            font-size: 1.6rem;
            font-weight: 760;
            letter-spacing: 0;
            line-height: 1.12;
            margin-bottom: 0.38rem;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .status-line {
            align-items: center;
            color: var(--text-muted);
            display: flex;
            flex: 0 0 auto;
            font-size: 0.82rem;
            gap: 0.45rem;
            min-height: 1.25rem;
            padding-top: 0.15rem;
        }

        .status-dot {
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(25, 198, 179, 0.12);
            height: 7px;
            width: 7px;
        }

        .status-line.error .status-dot {
            background: var(--error);
            box-shadow: 0 0 0 4px rgba(251, 113, 133, 0.12);
        }

        .workspace {
            display: grid;
            gap: 1rem;
            grid-template-columns: 340px minmax(0, 1fr);
            padding: 1.25rem;
        }

        .panel {
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent),
                var(--panel-strong);
            border: 1px solid var(--border);
            border-radius: 8px;
            min-width: 0;
            padding: 1rem;
        }

        .control-stack {
            display: grid;
            gap: 0.9rem;
        }

        label {
            color: var(--text-secondary);
            display: flex;
            font-size: 0.76rem;
            font-weight: 760;
            justify-content: space-between;
            letter-spacing: 0;
            margin-bottom: 0.55rem;
            text-transform: uppercase;
        }

        label span:last-child {
            color: var(--accent-hover);
            font-size: 0.72rem;
            text-transform: none;
        }

        input,
        select {
            background-color: var(--field);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            min-height: 54px;
            outline: none;
            transition: border-color 0.18s, box-shadow 0.18s, background-color 0.18s;
            width: 100%;
        }

        input {
            font-family: 'Cascadia Mono', 'SFMono-Regular', Consolas, 'Courier New', monospace;
            font-size: 1.2rem;
            font-weight: 650;
            padding: 0 0.9rem;
        }

        input::placeholder {
            color: rgba(154, 167, 184, 0.46);
        }

        input:focus,
        select:focus {
            border-color: rgba(94, 234, 212, 0.78);
            box-shadow: 0 0 0 3px rgba(25, 198, 179, 0.14);
        }

        input.invalid {
            background: var(--error-soft);
            border-color: rgba(251, 113, 133, 0.74);
            color: #fecdd3;
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239aa7b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-position: right 12px center;
            background-repeat: no-repeat;
            background-size: 16px;
            cursor: pointer;
            font-size: 0.94rem;
            font-weight: 700;
            padding: 0 2rem 0 0.85rem;
        }

        select option {
            background-color: #111827;
            color: var(--text-primary);
        }

        .split-row {
            display: grid;
            gap: 0.75rem;
            grid-template-columns: minmax(0, 1fr) 110px;
        }

        .base-shortcuts {
            display: grid;
            gap: 0.45rem;
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .preset-btn,
        .copy-btn {
            align-items: center;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
        }

        .preset-btn {
            background: var(--field-raised);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.72rem;
            font-weight: 760;
            min-height: 34px;
            transition: background-color 0.18s, border-color 0.18s, color 0.18s;
        }

        .preset-btn:hover,
        .preset-btn.active {
            background: var(--accent-soft);
            border-color: rgba(94, 234, 212, 0.38);
            color: var(--accent-hover);
        }

        .result-grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .result-card {
            background:
                linear-gradient(180deg, rgba(25, 198, 179, 0.07), transparent),
                var(--field-raised);
            border: 1px solid var(--border);
            border-radius: 8px;
            min-width: 0;
            padding: 0.95rem;
        }

        .result-card.primary {
            border-color: rgba(94, 234, 212, 0.34);
        }

        .result-topline {
            align-items: center;
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.65rem;
        }

        .result-title {
            color: var(--text-secondary);
            font-size: 0.76rem;
            font-weight: 760;
            text-transform: uppercase;
        }

        .result-formula {
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .output-wrapper {
            position: relative;
        }

        .output-field {
            background:
                linear-gradient(180deg, rgba(25, 198, 179, 0.1), rgba(25, 198, 179, 0.05)),
                var(--field);
            border-color: rgba(94, 234, 212, 0.34);
            color: var(--accent-hover);
            cursor: pointer;
            font-size: 1.12rem;
            padding-right: 3.2rem;
        }

        .copy-btn {
            background: rgba(248, 250, 252, 0.06);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--accent-hover);
            height: 36px;
            position: absolute;
            right: 9px;
            top: 9px;
            transition: background-color 0.18s, border-color 0.18s, color 0.18s;
            width: 36px;
        }

        .copy-btn:hover {
            background: var(--accent-soft);
            border-color: rgba(94, 234, 212, 0.42);
            color: #ffffff;
        }

        .copy-btn svg {
            height: 16px;
            width: 16px;
        }

        .normalized {
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-family: 'Cascadia Mono', 'SFMono-Regular', Consolas, 'Courier New', monospace;
            font-size: 0.85rem;
            margin-top: 1rem;
            overflow-wrap: anywhere;
            padding-top: 1rem;
        }

        .toast {
            background-color: #f8fafc;
            border-radius: 999px;
            bottom: 20px;
            box-shadow: 0 18px 34px rgba(0, 0, 0, 0.32);
            color: #090b10;
            font-size: 0.85rem;
            font-weight: 720;
            left: 50%;
            opacity: 0;
            padding: 10px 18px;
            pointer-events: none;
            position: fixed;
            transform: translateX(-50%) translateY(20px);
            transition: all 0.3s ease;
            white-space: nowrap;
            z-index: 100;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 840px) {
            body {
                align-items: flex-start;
            }

            header {
                display: block;
                padding: 1.2rem 1rem 1rem;
            }

            .status-line {
                margin-top: 0.85rem;
            }

            .workspace,
            .result-grid {
                grid-template-columns: 1fr;
            }

            .workspace {
                padding: 1rem;
            }
        }

        @media (max-width: 430px) {
            body {
                padding-left: 12px;
                padding-right: 12px;
            }

            h1 {
                font-size: 1.34rem;
            }

            .split-row,
            .base-shortcuts {
                grid-template-columns: 1fr 1fr;
            }

            input,
            select {
                min-height: 50px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div>
                <h1>Complement Calculator</h1>
                <p class="subtitle">Radix-minus-one and radix complements for bases 2 to 36</p>
            </div>
            <div class="status-line" id="statusLine">
                <span class="status-dot"></span>
                <span id="statusText">Ready</span>
            </div>
        </header>

        <div class="workspace">
            <section class="panel">
                <div class="control-stack">
                    <div>
                        <label for="inputValue">
                            <span>Number</span>
                            <span id="baseDisplay">Base 2</span>
                        </label>
                        <input type="text" id="inputValue" placeholder="101101" autocomplete="off">
                    </div>

                    <div class="split-row">
                        <div>
                            <label for="baseSelect">
                                <span>Base</span>
                                <span>2-36</span>
                            </label>
                            <select id="baseSelect" aria-label="Base"></select>
                        </div>
                        <div>
                            <label for="widthInput">
                                <span>Width</span>
                                <span>digits</span>
                            </label>
                            <input type="number" id="widthInput" min="1" max="256" value="8" inputmode="numeric">
                        </div>
                    </div>

                    <div class="base-shortcuts" aria-label="Base presets">
                        <button class="preset-btn" type="button" data-base="2">BIN</button>
                        <button class="preset-btn" type="button" data-base="8">OCT</button>
                        <button class="preset-btn" type="button" data-base="10">DEC</button>
                        <button class="preset-btn" type="button" data-base="16">HEX</button>
                    </div>
                </div>
            </section>

            <section class="panel">
                <div class="result-grid">
                    <div class="result-card primary">
                        <div class="result-topline">
                            <span class="result-title" id="minusOneTitle">1's complement</span>
                            <span class="result-formula" id="minusOneFormula">b - 1</span>
                        </div>
                        <div class="output-wrapper">
                            <input type="text" id="minusOneOutput" class="output-field" readonly placeholder="0">
                            <button class="copy-btn" type="button" data-copy="minusOneOutput" title="Copy result"
                                aria-label="Copy radix-minus-one complement">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M8 8h10v12H8z M6 16H4V4h12v2" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="result-card">
                        <div class="result-topline">
                            <span class="result-title" id="radixTitle">2's complement</span>
                            <span class="result-formula" id="radixFormula">b^n - x</span>
                        </div>
                        <div class="output-wrapper">
                            <input type="text" id="radixOutput" class="output-field" readonly placeholder="0">
                            <button class="copy-btn" type="button" data-copy="radixOutput" title="Copy result"
                                aria-label="Copy radix complement">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M8 8h10v12H8z M6 16H4V4h12v2" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="normalized" id="normalizedValue">Padded input: 00000000</div>
            </section>
        </div>
    </div>

    <div id="toast" class="toast">Copied to clipboard!</div>

    <script>
        const digits = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const inputValue = document.getElementById('inputValue');
        const baseSelect = document.getElementById('baseSelect');
        const widthInput = document.getElementById('widthInput');
        const baseDisplay = document.getElementById('baseDisplay');
        const minusOneOutput = document.getElementById('minusOneOutput');
        const radixOutput = document.getElementById('radixOutput');
        const minusOneTitle = document.getElementById('minusOneTitle');
        const radixTitle = document.getElementById('radixTitle');
        const minusOneFormula = document.getElementById('minusOneFormula');
        const radixFormula = document.getElementById('radixFormula');
        const normalizedValue = document.getElementById('normalizedValue');
        const statusLine = document.getElementById('statusLine');
        const statusText = document.getElementById('statusText');

        function populateBases() {
            for (let base = 2; base <= 36; base++) {
                baseSelect.add(new Option(`Base ${base}`, base));
            }
            baseSelect.value = "2";
        }

        function getDigitValue(char) {
            const code = char.charCodeAt(0);

            if (code >= 48 && code <= 57) return code - 48;
            if (code >= 65 && code <= 90) return code - 55;

            return -1;
        }

        function parseBigIntFromBase(value, base) {
            const bigBase = BigInt(base);
            let total = 0n;

            for (const char of value) {
                total = total * bigBase + BigInt(getDigitValue(char));
            }

            return total;
        }

        function formatBigIntToBase(value, base, width) {
            if (value === 0n) return "0".padStart(width, "0");

            const bigBase = BigInt(base);
            let remaining = value;
            let result = "";

            while (remaining > 0n) {
                result = digits[Number(remaining % bigBase)] + result;
                remaining /= bigBase;
            }

            return result.padStart(width, "0");
        }

        function setStatus(message, isError = false) {
            statusText.textContent = message;
            statusLine.classList.toggle('error', isError);
        }

        function getComplementLabel(base, offset) {
            if (base === 2) return offset === -1 ? "1's complement" : "2's complement";
            if (base === 10) return offset === -1 ? "9's complement" : "10's complement";
            return offset === -1 ? `${base - 1}'s complement` : `${base}'s complement`;
        }

        function isValidForBase(value, base) {
            return [...value].every((char) => {
                const digit = getDigitValue(char);
                return digit >= 0 && digit < base;
            });
        }

        function updatePresetButtons() {
            document.querySelectorAll('.preset-btn').forEach((button) => {
                button.classList.toggle('active', button.dataset.base === baseSelect.value);
            });
        }

        function clearOutputs() {
            minusOneOutput.value = "";
            radixOutput.value = "";
            normalizedValue.textContent = "Padded input: -";
        }

        function calculate() {
            const base = parseInt(baseSelect.value, 10);
            const rawValue = inputValue.value.trim().toUpperCase();
            const width = parseInt(widthInput.value, 10);

            baseDisplay.textContent = `Base ${base}`;
            minusOneTitle.textContent = getComplementLabel(base, -1);
            radixTitle.textContent = getComplementLabel(base, 0);
            minusOneFormula.textContent = `${base}^n - 1 - x`;
            radixFormula.textContent = `${base}^n - x`;
            updatePresetButtons();

            inputValue.classList.remove('invalid');
            widthInput.classList.remove('invalid');

            if (!Number.isInteger(width) || width < 1 || width > 256) {
                widthInput.classList.add('invalid');
                clearOutputs();
                setStatus('Width must be 1 to 256', true);
                return;
            }

            if (rawValue === "") {
                clearOutputs();
                normalizedValue.textContent = `Padded input: ${"0".repeat(width)}`;
                setStatus('Ready');
                return;
            }

            if (!isValidForBase(rawValue, base)) {
                inputValue.classList.add('invalid');
                clearOutputs();
                setStatus(`Invalid digit for base ${base}`, true);
                return;
            }

            if (rawValue.length > width) {
                widthInput.classList.add('invalid');
                clearOutputs();
                setStatus('Width is smaller than the number', true);
                return;
            }

            const normalized = rawValue.padStart(width, "0");
            const value = parseBigIntFromBase(normalized, base);
            const modulus = BigInt(base) ** BigInt(width);
            const minusOneComplement = (modulus - 1n) - value;
            const radixComplement = value === 0n ? 0n : modulus - value;

            minusOneOutput.value = formatBigIntToBase(minusOneComplement, base, width);
            radixOutput.value = formatBigIntToBase(radixComplement, base, width);
            normalizedValue.textContent = `Padded input: ${normalized}`;
            setStatus(`${width} digit${width === 1 ? '' : 's'} in base ${base}`);
        }

        function copyValue(id) {
            const field = document.getElementById(id);

            if (!field.value) return;

            if (!navigator.clipboard) {
                field.select();
                return;
            }

            navigator.clipboard.writeText(field.value).then(showToast).catch(() => {
                field.select();
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1800);
        }

        inputValue.addEventListener('input', calculate);
        baseSelect.addEventListener('change', calculate);
        widthInput.addEventListener('input', calculate);

        document.querySelectorAll('.preset-btn').forEach((button) => {
            button.addEventListener('click', () => {
                baseSelect.value = button.dataset.base;
                calculate();
            });
        });

        document.querySelectorAll('.copy-btn').forEach((button) => {
            button.addEventListener('click', () => copyValue(button.dataset.copy));
        });

        minusOneOutput.addEventListener('click', () => copyValue('minusOneOutput'));
        radixOutput.addEventListener('click', () => copyValue('radixOutput'));

        populateBases();
        calculate();
    </script>
</body>

</html>
